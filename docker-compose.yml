version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: devops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: devopsdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: devops-backend
    environment:
      MYSQL_URL: root:password@tcp(mysql:3306)/devopsdb?charset=utf8mb4&parseTime=True&loc=Local
      JWT_SECRET: your-secret-key-change-this-in-production
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: devops-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data: